name: Update tlBaseVersion (PR)

on:
  release:
    types: [published]

jobs:
  update-version:
    if: github.event.release.target_commitish == 'main'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute version from tag
        id: tagv
        run: |
          TAG="${{ github.event.release.tag_name }}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Skipping invalid tag"
            echo "run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          TAG="${TAG#v}"
          IFS='.' read -r X Y Z <<< "$TAG"

          VERSION="${X}.$((Y + 1))"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "run=true" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: changes
        if: steps.tagv.outputs.run == 'true'
        run: |
          sed -i -E 's|(^ThisBuild / tlBaseVersion := ")[^"]+(")|\1'"$VERSION"'\2|' build.sbt

          if git diff --quiet; then
            echo "No changes"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing PR
        id: prcheck
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="bump-base-version-${VERSION}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          PR_EXISTS=$(gh pr list --head "$BRANCH" --json number --jq 'length > 0')

          echo "PR_EXISTS=$PR_EXISTS" >> $GITHUB_OUTPUT
          echo "PR already exists: $PR_EXISTS"

      - name: Checkout commit push
        if: steps.prcheck.outputs.PR_EXISTS == 'false'
        run: |
          git fetch origin main
          git checkout -B "$BRANCH" origin/main

          git add build.sbt
          git commit -m "Update tlBaseVersion to $VERSION"

          git push origin "$BRANCH"

      - name: Create Pull Request
        if: steps.prcheck.outputs.PR_EXISTS == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "Update tlBaseVersion to $VERSION" \
            --body "Derived from release tag v${TAG}. Patch ignored. Next base version: ${VERSION}." \
            --base main \
            --head "$BRANCH"
